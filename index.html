<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polling Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="relative overflow-hidden">
      <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_top,_rgba(56,189,248,0.18),_transparent_55%)]"></div>
      <div class="pointer-events-none absolute -top-32 right-0 h-96 w-96 rounded-full bg-cyan-500/10 blur-3xl"></div>
      <div class="pointer-events-none absolute -bottom-40 left-0 h-96 w-96 rounded-full bg-fuchsia-500/10 blur-3xl"></div>

      <main class="relative mx-auto flex min-h-screen w-full max-w-6xl flex-col gap-10 px-6 py-12">
        <header class="flex flex-col gap-3">
          <p class="text-xs uppercase tracking-[0.35em] text-cyan-200/70">Polling Tool</p>
          <h1 class="text-3xl font-semibold text-white md:text-5xl">
            Build quick polls, share a unique link, and capture ranked or single-choice feedback.
          </h1>
          <p class="max-w-2xl text-sm text-slate-300">
            Everything runs in your browser storage for now. Use the admin panel to create polls and
to archive results when the poll is finished.
          </p>
        </header>

        <section id="view-container" class="grid gap-6"></section>
      </main>
    </div>

    <template id="home-view">
      <div class="grid gap-8 lg:grid-cols-[1.1fr_0.9fr]">
        <section class="rounded-3xl border border-white/10 bg-white/5 p-6 shadow-lg shadow-cyan-500/10">
          <div class="flex items-center justify-between">
            <h2 class="text-xl font-semibold text-white">Create a new poll</h2>
            <span class="rounded-full bg-cyan-500/15 px-3 py-1 text-xs text-cyan-200">Admin</span>
          </div>
          <div id="admin-tools" class="mt-3 flex items-center justify-between gap-2 text-xs text-slate-300">
            <span id="admin-email"></span>
            <button
              type="button"
              id="sign-out"
              class="rounded-full border border-white/20 px-3 py-1 text-xs text-white/80 hover:border-white/40"
            >
              Sign out
            </button>
          </div>

          <div
            id="edit-banner"
            class="mt-4 hidden items-center justify-between gap-3 rounded-2xl border border-amber-400/30 bg-amber-500/10 px-4 py-3 text-xs text-amber-100"
          >
            <div>
              <p class="font-semibold">Editing active poll</p>
              <p class="text-amber-200/80">Saving changes will reset existing votes.</p>
            </div>
            <button
              type="button"
              id="cancel-edit"
              class="rounded-full border border-amber-300/40 px-3 py-1 text-xs text-amber-100 hover:border-amber-200"
            >
              Cancel
            </button>
          </div>

          <form id="poll-form" class="mt-6 grid gap-6">
            <div class="grid gap-2">
              <label class="text-xs uppercase tracking-widest text-slate-400">Title</label>
              <input
                class="rounded-xl border border-white/10 bg-slate-900/60 px-4 py-3 text-sm text-white"
                name="title"
                placeholder="Friday retro vote"
                required
              />
            </div>
            <div class="grid gap-2">
              <label class="text-xs uppercase tracking-widest text-slate-400">Description</label>
              <textarea
                class="min-h-[90px] rounded-xl border border-white/10 bg-slate-900/60 px-4 py-3 text-sm text-white"
                name="description"
                placeholder="Let the team decide the topic."
              ></textarea>
            </div>
            <div class="grid gap-2">
              <label class="text-xs uppercase tracking-widest text-slate-400">Poll type</label>
              <select
                class="rounded-xl border border-white/10 bg-slate-900/60 px-4 py-3 text-sm text-white"
                name="type"
              >
                <option value="single">Select one</option>
                <option value="favorite">Pick favorite</option>
                <option value="ranking">Ranking</option>
              </select>
            </div>

            <div class="grid gap-4">
              <div class="flex items-center justify-between">
                <h3 class="text-sm font-semibold text-white">Questions</h3>
                <button
                  type="button"
                  id="add-question"
                  class="rounded-full border border-cyan-400/40 px-3 py-1 text-xs text-cyan-200 hover:border-cyan-300"
                >
                  Add question
                </button>
              </div>
              <div id="questions" class="grid gap-4"></div>
            </div>

            <div class="grid gap-2">
              <label class="text-xs uppercase tracking-widest text-slate-400">Template string</label>
              <textarea
                class="min-h-[90px] rounded-xl border border-white/10 bg-slate-900/60 px-4 py-3 text-sm text-white"
                name="template"
                placeholder="Top pick: {topic}. Backup: {backup}."
              ></textarea>
              <p class="text-xs text-slate-400">Use `{variable}` for each question variable name.</p>
            </div>

            <button
              type="submit"
              class="rounded-xl bg-cyan-500 px-4 py-3 text-sm font-semibold text-slate-900 hover:bg-cyan-400"
            >
              Create poll
            </button>
          </form>
        </section>

        <section class="grid gap-6">
          <div class="rounded-3xl border border-white/10 bg-white/5 p-6">
            <h2 class="text-lg font-semibold text-white">Active polls</h2>
            <div id="poll-list" class="mt-4 grid gap-3 text-sm text-slate-200"></div>
          </div>
          <div class="rounded-3xl border border-white/10 bg-white/5 p-6">
            <h2 class="text-lg font-semibold text-white">Archive</h2>
            <div id="archive-list" class="mt-4 grid gap-3 text-sm text-slate-300"></div>
          </div>
        </section>
      </div>
    </template>

    <template id="auth-view">
      <section class="rounded-3xl border border-white/10 bg-white/5 p-8 shadow-lg shadow-cyan-500/10">
        <p class="text-xs uppercase tracking-[0.35em] text-cyan-200/70">Admin Access</p>
        <h2 class="mt-3 text-2xl font-semibold text-white">Sign in to manage polls</h2>
        <p id="auth-message" class="mt-2 text-sm text-slate-300">
          Voting is public. Creating, editing, and viewing results requires admin sign-in.
        </p>
        <button
          type="button"
          id="sign-out"
          class="hidden w-fit rounded-full border border-white/20 px-3 py-1 text-xs text-white/80 hover:border-white/40"
        >
          Sign out
        </button>
        <form id="auth-form" class="mt-6 grid gap-3">
          <input
            type="email"
            name="email"
            class="rounded-xl border border-white/10 bg-slate-900/60 px-4 py-3 text-sm text-white"
            placeholder="you@company.com"
            autocomplete="email"
            required
          />
          <button
            id="auth-submit"
            type="submit"
            class="rounded-xl bg-cyan-500 px-4 py-3 text-sm font-semibold text-slate-900 hover:bg-cyan-400"
          >
            Send magic link
          </button>
        </form>
        <p class="mt-3 text-xs text-slate-400">
          Check your inbox for a magic link. You will be returned here after signing in.
        </p>
      </section>
    </template>

    <template id="vote-view">
      <section class="grid gap-6 rounded-3xl border border-white/10 bg-white/5 p-6">
        <div class="flex items-start justify-between gap-4">
          <div>
            <p class="text-xs uppercase tracking-[0.35em] text-cyan-200/70">Poll</p>
            <h2 id="poll-title" class="text-2xl font-semibold text-white"></h2>
            <p id="poll-description" class="mt-2 whitespace-pre-line text-sm text-slate-300"></p>
          </div>
          <a
            href="./index.html"
            class="rounded-full border border-white/20 px-3 py-1 text-xs text-white/80 hover:border-white/40"
            >Back</a
          >
        </div>

        <form id="vote-form" class="grid gap-6"></form>

        <div class="grid gap-3 rounded-2xl border border-white/10 bg-slate-900/60 p-4">
          <p class="text-xs uppercase tracking-widest text-slate-400">Live template preview</p>
          <p id="template-preview" class="text-base text-cyan-100" aria-live="polite"></p>
        </div>

        <div class="grid gap-3 rounded-2xl border border-white/10 bg-slate-900/60 p-4">
          <div class="flex items-center justify-between">
            <p class="text-xs uppercase tracking-widest text-slate-400">Results (Public)</p>
            <button
              id="toggle-results"
              type="button"
              class="rounded-full border border-white/20 px-3 py-1 text-xs text-white/80 hover:border-white/40"
            >
              View results
            </button>
          </div>
          <div id="public-results" class="hidden text-xs text-slate-300" aria-live="polite"></div>
        </div>

        <button
          id="submit-vote"
          class="rounded-xl bg-cyan-500 px-4 py-3 text-sm font-semibold text-slate-900 hover:bg-cyan-400"
        >
          Submit vote
        </button>
      </section>
    </template>

    <template id="question-card">
      <div class="rounded-2xl border border-white/10 bg-slate-900/60 p-4">
        <div class="grid gap-3">
          <div class="flex items-center justify-between">
            <p class="text-xs uppercase tracking-widest text-slate-400">Question</p>
            <button type="button" class="remove-question text-xs text-rose-200 hover:text-rose-100">
              Remove
            </button>
          </div>
          <input
            class="rounded-xl border border-white/10 bg-slate-900/60 px-3 py-2 text-sm text-white"
            name="question"
            placeholder="What should we talk about?"
            required
          />
          <input
            class="rounded-xl border border-white/10 bg-slate-900/60 px-3 py-2 text-xs text-slate-200"
            name="variable"
            placeholder="Variable name (e.g. topic)"
            required
          />
          <div class="grid gap-2" data-options>
            <p class="text-xs uppercase tracking-widest text-slate-400">Options</p>
          </div>
          <label class="flex items-center gap-2 text-xs text-slate-300">
            <input type="checkbox" name="allowFreeText" class="h-4 w-4" />
            Allow free text option
          </label>
          <input
            class="rounded-xl border border-white/10 bg-slate-900/60 px-3 py-2 text-xs text-slate-200"
            name="freeTextLabel"
            placeholder="Free text label (e.g. Other)"
            disabled
          />
          <button
            type="button"
            class="add-option rounded-full border border-white/20 px-3 py-1 text-xs text-white/80 hover:border-white/40"
          >
            Add option
          </button>
        </div>
      </div>
    </template>

    <template id="option-row">
      <div class="flex items-center gap-2">
        <input
          class="flex-1 rounded-xl border border-white/10 bg-slate-900/60 px-3 py-2 text-sm text-white"
          name="option"
          placeholder="Option"
          required
        />
        <button type="button" class="remove-option text-xs text-rose-200 hover:text-rose-100">Remove</button>
      </div>
    </template>

    <template id="poll-card">
      <div class="rounded-2xl border border-white/10 bg-slate-900/70 p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-sm font-semibold text-white" data-title></p>
            <p class="text-xs text-slate-400" data-meta></p>
          </div>
          <span class="rounded-full bg-emerald-500/15 px-2 py-0.5 text-xs text-emerald-200" data-status>
            Active
          </span>
        </div>
        <div class="mt-3 flex flex-wrap gap-2 text-xs">
          <button class="copy-link rounded-full border border-white/20 px-3 py-1 text-white/80">
            Copy link
          </button>
          <button class="edit-poll rounded-full border border-amber-300/40 px-3 py-1 text-amber-100">
            Edit poll
          </button>
          <button class="view-results rounded-full border border-white/20 px-3 py-1 text-white/80">
            View results
          </button>
          <button class="finalize rounded-full border border-rose-400/50 px-3 py-1 text-rose-200">
            Finalize & archive
          </button>
        </div>
        <div class="mt-3 hidden rounded-xl border border-white/10 bg-slate-950/60 p-3 text-xs text-slate-300" data-results></div>
      </div>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
